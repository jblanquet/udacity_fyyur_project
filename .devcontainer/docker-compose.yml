version: '3.8'

services:
  app:
    container_name: fyyur-app
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://udacity:udacity@db:5432/fyyur
    depends_on:
      - db
    ports:
      - "5000:5000"

  db:
    container_name: fyyur-db
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: udacity
      POSTGRES_PASSWORD: udacity
      POSTGRES_DB: fyyur
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
